name: op-scanner

# Reads variables from infra/.env (copy infra/.env.example -> infra/.env first).
# Run from this directory:  docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      IMAGE_CACHE_DIR: /data/images
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
    volumes:
      - imgcache:/data/images
    ports:
      - "${API_PORT:-3000}:3000"

  # Card-data ingestion job — added in Phase 1 (runs the CardSource pipeline).
  # ingest:
  #   build:
  #     context: ..
  #     dockerfile: ingest/Dockerfile
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     APITCG_API_KEY: ${APITCG_API_KEY}

volumes:
  pgdata:
  imgcache:
