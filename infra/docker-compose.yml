name: op-scanner

# Reads variables from infra/.env (copy infra/.env.example -> infra/.env first).
# Run from this directory:  docker compose up --build

services:
  # op-scanner's OWN Postgres (isolated from anything else on the host). The API
  # reaches it over the internal compose network (host "postgres"), so it needs
  # no published host port; the mapping below is localhost-only on POSTGRES_PORT
  # (default 5433) purely for optional host-side access, and deliberately avoids
  # 5432 which is commonly already taken.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    # The bundled "postgres" starts by default and the API waits for it to be
    # healthy. required: false keeps the API working if you instead run it
    # against an external DB via `docker compose up --no-deps api`.
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    # Lets DATABASE_URL reach a Postgres running on the Docker HOST via
    # host.docker.internal (only relevant for the external-DB path above).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      IMAGE_CACHE_DIR: /data/images
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
    volumes:
      - imgcache:/data/images
    ports:
      - "${API_PORT:-3000}:3000"

  # Card-data ingestion job — added in Phase 1 (runs the CardSource pipeline).
  # ingest:
  #   build:
  #     context: ..
  #     dockerfile: ingest/Dockerfile
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     APITCG_API_KEY: ${APITCG_API_KEY}

volumes:
  pgdata:
  imgcache:
